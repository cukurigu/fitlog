{% extends "base.html" %}
{% block title %}Delete Muscle{% endblock %}

{% block content %}
<h2>Delete Muscle</h2>

<p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'muscle-list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
