{% extends "base.html" %}
{% block title %}Muscles{% endblock %}

{% block content %}
<h2>Muscle Groups</h2>

<a href="{% url 'muscle-create' %}" class="btn btn-success mb-3">
    Add Muscle
</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for muscle in muscles %}
        <tr>
            <td>{{ muscle.name }}</td>
            <td>{{ muscle.get_category_display }}</td>
            <td class="text-end">
                <a href="{% url 'muscle-create' %}" class="btn btn-primary mb-3">Add Muscle</a>
                <a href="{% url 'muscle-update' muscle.pk %}" class="btn btn-sm btn-primary">Edit</a>
                <a href="{% url 'muscle-delete' muscle.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No muscles added yet.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
