<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FitLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; overflow-y: scroll; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .contribution-grid { display: flex; gap: 3px; }
        .contribution-week { display: flex; flex-direction: column; gap: 3px; }
        .contribution-day {
            width: 13px; height: 13px; border-radius: 2px; background: #e4e4e4;
        }
        .contribution-day.level-0 { background: #e4e4e4; }
        .contribution-day.level-2 { background: #2d6a4f; }
        .contribution-day.level-future { background: transparent; border: 1px solid #e4e4e4; }
        .pr-badge { font-size: 0.7rem; vertical-align: middle; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">💪 FitLog</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a href="{% url 'exercise-list' %}" class="btn btn-outline-light btn-sm">Exercises</a>
            <a href="{% url 'workout-create' %}" class="btn btn-success btn-sm">+ New Workout</a>
        </div>
    </div>
</nav>
<div class="container pb-5">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
