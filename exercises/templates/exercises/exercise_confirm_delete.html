{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center p-4">
                <h4>Delete "{{ exercise.name }}"?</h4>
                <p class="text-muted">This cannot be undone.</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, delete</button>
                    <a href="{% url 'exercise-list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
