{% extends 'base.html' %}
{% block title %}Exercise Details{% endblock %}
{% block content %}
<h2>{{ exercise.name }}</h2>
<p><strong>Muscle Group:</strong> {{ exercise.muscle.category }}</p>
<p><strong>Description:</strong> {{ exercise.description }}</p>

<a class="btn btn-warning" href="{% url 'exercise-update' exercise.pk %}">Edit</a>
<a class="btn btn-danger" href="{% url 'exercise-delete' exercise.pk %}">Delete</a>
<a class="btn btn-secondary" href="{% url 'exercise-list' %}">Back to List</a>
{% endblock %}
